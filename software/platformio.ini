; Touch Music Kit — ESP32-DevKitC firmware
; Build/upload:  pio run -t upload   |   Serial monitor: pio device monitor
[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed  = 115200
upload_speed   = 921600

; Audio engine is timing-sensitive; keep -O2 (PlatformIO default for release).
build_flags =
    -O2

lib_deps =
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit SSD1306 @ ^2.5.9
    adafruit/Adafruit NeoPixel @ ^1.12.0
